{% extends "base.html" %}
{% block title %}Nuevo Empleado{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">REGISTRAR EMPLEADO</h1>
  <a href="{{ url_for('admin.lista_empleados') }}" class="btn-secondary">← Volver</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" name="nombre" required>
      </div>
      <div class="form-group">
        <label>Edad</label>
        <input type="number" name="edad" min="18" max="99" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Cédula</label>
        <input type="number" name="cedula" required>
      </div>
      <div class="form-group">
        <label>Rango</label>
        <select name="rango">
          <option value="vendedor">Vendedor</option>
          <option value="administrador">Administrador</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" name="contrasena" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Dirección (opcional)</label>
        <input type="text" name="direccion" placeholder="Se genera automáticamente">
      </div>
      <div class="form-group">
        <label>Teléfono (opcional)</label>
        <input type="text" name="telefono" placeholder="Se genera automáticamente">
      </div>
    </div>
    <button type="submit" class="btn-primary btn-full">REGISTRAR EMPLEADO</button>
  </form>
</div>
{% endblock %}
